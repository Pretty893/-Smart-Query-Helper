    try:
        # 1. 检索
        results = vector_store.search(question, category)
        if not results:
            raise NoResultException("未找到相关文档")
        
        # 2. 调用LLM
        answer = llm.generate(prompt)
        return answer
        
    except (requests.RequestException, APIError, RateLimitError) as e:
        # 网络/API错误
        raise NetworkException(f"服务连接失败: {e}")
        
    except (ChromaError, FileNotFoundError, json.JSONDecodeError) as e:
        # 数据库/存储错误
        raise DatabaseException(f"知识库异常: {e}")

# 统一处理
try:
    answer = chat(question, category)
    
except NetworkException as e:
    return {
        "error_type": "network",
        "message": "连接失败，请检查 API Key 和网络",
        "detail": str(e)
    }
    
except DatabaseException as e:
    return {
        "error_type": "database", 
        "message": "知识库异常，请联系管理员",
        "detail": str(e)
    }
    
except NoResultException as e:
    return {
        "error_type": "no_result",
        "message": "未找到相关内容，建议换个关键词试试",
        "detail": str(e)
    }
